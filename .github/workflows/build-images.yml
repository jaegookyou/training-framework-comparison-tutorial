# 프레임워크 이미지 빌드 → GHCR push (수동 실행).
#
# 왜 Actions 인가: 렌트 박스(Vast 등 신뢰 못 하는 하드웨어)에 크레덴셜을 안 올린다.
# push 인증은 job 마다 자동 발급되는 임시 GITHUB_TOKEN 이라 job 끝나면 소멸 → 외부로 안 샌다.
# 무료(public repo), SSH·디스크 저글링 없음.
#
# 실행: GitHub → Actions 탭 → "build-images" → Run workflow.
#   only 비움 + include_heavy=false (기본): base + verl/trl/unsloth/torchtitan/megatron-lm.
#   only 비움 + include_heavy=true       : 위 + megatron-bridge/nemo-rl/slime/torchtitan-rl (남의 큰 베이스+nvcc
#                                          컴파일 — 러너 디스크/시간/업스트림 pull 인증에 걸릴 수 있어 opt-in).
#   only="megatron-bridge,torchtitan-rl" : 지정한 이미지들만 빌드(include_heavy 무시). 재빌드 낭비 방지.
#     - base 를 목록에 넣지 않으면 base 는 재빌드 안 하고 GHCR 의 base:latest 를 그대로 FROM 한다.
#     - only 에 base 를 넣으면 base 도 재빌드된다(frameworks 가 새 base 를 쓰려면 함께 지정).
#
# 이미지 경로는 Dockerfile 의 이름과 정확히 일치: ghcr.io/<owner>/<repo>/<img>:latest

name: build-images

on:
  workflow_dispatch:
    inputs:
      include_heavy:
        description: "무거운 이미지(megatron-bridge/nemo-rl/slime/torchtitan-rl)도 빌드 (only 비었을 때만 적용)"
        type: boolean
        default: false
      only:
        description: "특정 이미지만 빌드(쉼표구분, 예: megatron-bridge,torchtitan-rl). 비우면 include_heavy 규칙."
        type: string
        default: ""

permissions:
  contents: read      # checkout
  packages: write     # GHCR push

concurrency:
  group: build-images
  cancel-in-progress: false

jobs:
  # 0) 입력(only/include_heavy)을 빌드할 이미지 목록으로 해석 → 아래 job 들의 동적 매트릭스.
  #    only 지정 시 그 목록만, 아니면 base+frameworks(+heavy 면 standalone).
  setup:
    runs-on: ubuntu-latest
    outputs:
      base: ${{ steps.plan.outputs.base }}
      frameworks: ${{ steps.plan.outputs.frameworks }}
      standalone: ${{ steps.plan.outputs.standalone }}
    steps:
      - id: plan
        env:
          ONLY: ${{ inputs.only }}
          HEAVY: ${{ inputs.include_heavy }}
        run: |
          python3 - <<'PY'
          import json, os
          only = [x.strip() for x in os.environ["ONLY"].split(",") if x.strip()]
          heavy = os.environ["HEAVY"] == "true"
          frameworks = ["verl", "trl", "unsloth", "torchtitan", "megatron-lm"]
          standalone = ["megatron-bridge", "nemo-rl", "slime", "torchtitan-rl"]
          if only:
              base = "base" in only
              frameworks = [x for x in frameworks if x in only]
              standalone = [x for x in standalone if x in only]
          else:
              base = True
              standalone = standalone if heavy else []
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"base={'true' if base else 'false'}\n")
              f.write("frameworks=" + json.dumps(frameworks) + "\n")
              f.write("standalone=" + json.dumps(standalone) + "\n")
          print("base:", base, "frameworks:", frameworks, "standalone:", standalone)
          PY

  # 1) 공통 base — 아래 frameworks 가 FROM 하는 부모. 먼저 push 되어야 한다.
  #    only 로 base 를 지정하지 않으면 건너뛴다(기존 GHCR base:latest 재사용).
  base:
    needs: setup
    if: ${{ needs.setup.outputs.base == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Free up disk
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /usr/local/.ghcup /opt/hostedtoolcache/CodeQL \
                      /usr/local/share/boost "${AGENT_TOOLSDIRECTORY:-}" || true
          sudo docker image prune --all --force || true
          df -h
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build & push base
        run: |
          R=ghcr.io/${{ github.repository }}
          D=$(date +%Y%m%d)
          docker build -f docker/base.Dockerfile -t "$R/base:latest" -t "$R/base:$D" .
          docker push "$R/base:latest"
          docker push "$R/base:$D"   # 불변 태그 박제(휠 증발 대비)

  # 2) 우리 base:latest 위에 얹는 이미지들 (base 완료 후 병렬).
  #    base 를 이번에 안 빌드해도(needs 스킵) 기존 base:latest 를 FROM → !failure() 로 진행.
  frameworks:
    needs: [setup, base]
    if: ${{ !failure() && !cancelled() && needs.setup.outputs.frameworks != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # 하나 실패해도 나머지는 계속
      matrix:
        img: ${{ fromJSON(needs.setup.outputs.frameworks) }}
    steps:
      - uses: actions/checkout@v4
      - name: Free up disk
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /usr/local/.ghcup /opt/hostedtoolcache/CodeQL \
                      /usr/local/share/boost "${AGENT_TOOLSDIRECTORY:-}" || true
          sudo docker image prune --all --force || true
          df -h
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build & push ${{ matrix.img }}
        run: |
          R=ghcr.io/${{ github.repository }}
          D=$(date +%Y%m%d)
          docker build -f docker/${{ matrix.img }}.Dockerfile -t "$R/${{ matrix.img }}:latest" -t "$R/${{ matrix.img }}:$D" .
          docker push "$R/${{ matrix.img }}:latest"
          docker push "$R/${{ matrix.img }}:$D"   # 불변 태그 박제

  # 3) 남의 큰 베이스에서 독립 빌드. base 불필요 → 병렬.
  standalone:
    needs: setup
    if: ${{ needs.setup.outputs.standalone != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        img: ${{ fromJSON(needs.setup.outputs.standalone) }}
    steps:
      - uses: actions/checkout@v4
      - name: Free up disk
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /usr/local/.ghcup /opt/hostedtoolcache/CodeQL \
                      /usr/local/share/boost "${AGENT_TOOLSDIRECTORY:-}" || true
          sudo docker image prune --all --force || true
          df -h
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build & push ${{ matrix.img }}
        run: |
          R=ghcr.io/${{ github.repository }}
          D=$(date +%Y%m%d)
          docker build -f docker/${{ matrix.img }}.Dockerfile -t "$R/${{ matrix.img }}:latest" -t "$R/${{ matrix.img }}:$D" .
          docker push "$R/${{ matrix.img }}:latest"
          docker push "$R/${{ matrix.img }}:$D"   # 불변 태그 박제
