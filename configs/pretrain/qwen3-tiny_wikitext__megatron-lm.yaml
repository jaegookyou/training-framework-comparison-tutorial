extends: _base.yaml

framework: megatron-lm
image: ghcr.io/jaegookyou/training-framework-comparison-tutorial/megatron-lm:latest

# 순수 Megatron-LM 사전학습(pretrain_gpt.py). torchtitan 과 동일 arch(tfct_tiny 치수)·데이터
# (wikitext)·HP 로 from-scratch → 가로비교 성립. arch 플래그는 model_sizes.megatron_arch_args
# (qwen3_8b.sh 미러), 데이터는 preprocess_data.py 인덱싱(.bin/.idx). SFT/GRPO 와 같은 이미지.

# megatron 고유 knob (다른 프레임워크는 안 씀 → _base 아니라 여기에만).
megatron:
  tensor_model_parallel_size: 1      # tiny → 단일 GPU 로 충분(TP 1)
  pipeline_model_parallel_size: 1
  preprocess_workers: 8              # tools/preprocess_data.py 병렬 토크나이즈
  save_interval: 1000
  log_interval: 10

# 초소형(tiny) → 단일 GPU. 스케일(0.6b+ / wikitext-103) 시 gpus·TP 키우면 Megatron 샤딩.
scale:
  nodes: 1
  gpus: 1
