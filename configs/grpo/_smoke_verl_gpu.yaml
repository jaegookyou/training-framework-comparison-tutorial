# GPU 스모크(SNSG) — verl LoRA GRPO 를 실제 8B·bf16·이미지·캐논 template 로 end-to-end 검증.
# verl 의 본진 = ray main_ppo(단노드는 로컬 ray) + vLLM rollout. LoRA 라 1카드에서 정책+vllm 공유
# (부모 config gpu_memory_utilization:0.6). 공유 gsm8k_score 를 custom_reward_function 으로.
# knob 소비: subsample=verl_grpo.py:42-44 / max_steps→trainer.total_training_steps=verl_grpo.py:152-155.
extends: qwen3-8b_gsm8k__verl__lora.yaml

dataset:
  subsample: 64                 # gsm8k 한 줌만 (프롬프트·정답추출·reward 경로는 실제로 태움)

debug:
  max_steps: 5                  # 5 step 만 — 로컬 ray·vLLM rollout·reward·wandb 정합만 확인
