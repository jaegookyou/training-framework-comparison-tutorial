# GPU 스모크(SNSG) — trl LoRA GRPO 를 실제 8B·bf16·이미지·캐논 template 로 end-to-end 검증.
# SFT/DPO 와 결정적으로 다른 경로: gsm8k 생성(generation) + 공유 gsm8k_score reward + 그룹 정규화.
# 통과하면 max_steps:-1 풀런으로 승격.
# knob 소비: subsample=trl_grpo.py:37-39 / max_steps=trl_grpo.py:71(GRPOConfig.max_steps).
extends: qwen3-8b_gsm8k__trl__lora.yaml

dataset:
  subsample: 64                 # gsm8k 한 줌만 (프롬프트·정답추출·reward 경로는 실제로 태움)

debug:
  max_steps: 5                  # 5 step 만 — 생성·reward·advantage·wandb 정합만 확인
