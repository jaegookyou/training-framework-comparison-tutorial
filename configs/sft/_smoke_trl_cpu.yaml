# 로컬 CPU 스모크 전용 — TRL 경로가 end-to-end 로 도는지만 본다(통제비교 run 아님).
# 실제 1GPU run 은 qwen0.5b_smoltalk__trl__1gpu.yaml. 여기선 CPU 에 맞춰 축소만 한다.
extends: qwen0.5b_smoltalk__trl__1gpu.yaml

model:
  max_seq_len: 512            # CPU 속도용 축소

dataset:
  subsample: 32               # 한 줌만

hp:
  per_device_batch_size: 2    # CPU 메모리
  bf16: false                 # CPU 는 bf16 학습 비호환

output:
  local_dir: ./out/smoke      # 로컬 쓰기 가능 경로 (_base 의 /workspace 컨테이너 경로 대체)

debug:
  max_steps: 2                # 두 step 만 돌고 끝
