# 로컬 CPU 스모크 전용 — TRL 경로가 end-to-end 로 도는지만 본다(통제비교 run 아님).
# 실제 run 은 qwen3.5-9b_traceinversion__trl__{lora,full}.yaml. 여기선 CPU 에 맞춰
# 모델·seq·배치를 축소한다(9B 는 CPU 에 안 올라감). tuning=lora 는 lora config 에서 상속.
extends: qwen3.5-9b_traceinversion__trl__lora.yaml

model:
  name: Qwen/Qwen2.5-0.5B       # CPU 에 올릴 수 있는 소형 표준 모델
  max_seq_len: 512             # CPU 속도용 축소

dataset:
  subsample: 32                # 한 줌만 (traceinversion 어댑터 경로까지 검증)

hp:
  per_device_batch_size: 2     # CPU 메모리
  bf16: false                  # CPU 는 bf16 학습 비호환
  # 캐논 reasoning_chatml(_base 상속)이 {% generation %} 마커를 가지므로 모델 무관하게
  # assistant 마스크 경로까지 CPU 에서 검증된다(GPU 없이 generation-mask machinery 점검).
  assistant_only_loss: true

output:
  local_dir: ./out/smoke       # 로컬 쓰기 가능 경로 (_base 의 /workspace 컨테이너 경로 대체)

debug:
  max_steps: 2                 # 두 step 만 돌고 끝
