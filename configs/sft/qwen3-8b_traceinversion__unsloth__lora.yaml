extends: _base.yaml

framework: unsloth
tuning: lora                  # Unsloth LoRA 슬롯(본령). full 은 __full 파일이 단일 GPU full FT 로.
image: ghcr.io/jaegookyou/training-framework-comparison-tutorial/unsloth:latest

# LoRA 는 어댑터만 학습 → full 보다 큰 lr (trl lora 와 동일 눈금).
hp:
  learning_rate: 2.0e-4

# Unsloth 는 단일 GPU 전용 — 멀티GPU/멀티노드 스케일 없음.
scale:
  nodes: 1
  gpus: 1
