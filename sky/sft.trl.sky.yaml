# tfct SFT 런 — SkyPilot task.
#
# 직접 짠 vast 런처/onstart 를 대체한다. SkyPilot 이 오퍼 검색 → 인스턴스 생성 →
# 코드 업로드 → setup/run → (sky down 시) 파기 + 스팟 끊기면 자동 복구까지 처리한다.
#
# 프레임워크당 이 파일 하나. image_id 는 프레임워크별 고정, CONFIG·accelerators 는
# tuning(full|lora) 에 따라 런치 때 override 한다(기본 = lora, A100×1).
#
# 사용:
#   export WANDB_API_KEY=...  HF_TOKEN=...
#   # LoRA (기본):
#   sky launch -c tfct sky/sft.trl.sky.yaml --env WANDB_API_KEY --env HF_TOKEN
#   # full FT (9B 는 멀티GPU 샤딩 필요):
#   sky launch -c tfct sky/sft.trl.sky.yaml --gpus A100:8 \
#     --env CONFIG=configs/sft/qwen3-8b_traceinversion__trl__full.yaml \
#     --env WANDB_API_KEY --env HF_TOKEN
#   sky logs tfct                     # 로그 스트리밍
#   sky down tfct                     # 끝나면 파기 (idle 과금 방지)
#
# Vast.ai 백엔드: Vast 계정 페이지에서 API 키를 받아 ~/.config/vastai/vast_api_key
# 에 저장하면 SkyPilot 이 Vast 오퍼를 띄운다. 특정 클라우드 고정은 --cloud vast.
# (vastai CLI 자체는 안 쓴다 — SkyPilot 이 내부에서 Vast API 를 호출한다.)

name: tfct-sft-trl

resources:
  accelerators: A100:1                                 # LoRA 9B 기본(A100 40GB 한 장). full FT 는 --gpus 로 override
  use_spot: true                                       # 스팟; 끊기면 SkyPilot 이 자동 복구
  image_id: docker:ghcr.io/jaegookyou/training-framework-comparison-tutorial/trl:latest  # 프레임워크별 deps 핀 고정 이미지. configs 의 image 와 일치시킬 것

workdir: .                                             # 이 repo 를 통째로 박스로 업로드 (코드는 런타임에, 이미지 재빌드 없이)

envs:
  CONFIG: configs/sft/qwen3-8b_traceinversion__trl__lora.yaml
  WANDB_API_KEY: ""                                    # `--env WANDB_API_KEY` 로 로컬 셸에서 주입
  HF_TOKEN: ""                                         # `--env HF_TOKEN` 로 주입 (HF Hub push 시)

setup: |
  pip install -e .                                     # 코드만 (무거운 deps 는 image 에 이미 있음)

run: |
  # 멀티GPU/멀티노드면 torchrun 으로 tfct-run 을 감싼다(HF Trainer=DDP/FSDP 자동 감지).
  # 단노드 1GPU 면 그대로 tfct-run. full FT FSDP 는 trl_sft.apply_multigpu_fsdp 가 켠다.
  bash sky/hf_torchrun_launch.sh "$CONFIG"
