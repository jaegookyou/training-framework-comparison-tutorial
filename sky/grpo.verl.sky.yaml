# tfct GRPO 런 (verl) — SkyPilot task.
#
# verl 의 본진(GRPO 1급 시민). SFT verl 과 달리 학습은 ray 기반 main_ppo 지만, 런치는 우리
# entrypoint(tfct-run)가 RunConfig 를 verl override 로 번역해 `python -m verl.trainer.main_ppo`
# 를 내부에서 띄운다 → 이 run 블록은 다른 sky 와 동일하게 `tfct-run --config $CONFIG` 한 줄.
#
# rollout 은 vllm(verl 기본, 이미지에 vllm 포함) → TRL GRPO 의 vllm 공백이 여기엔 없다.
#
# 사용:
#   export WANDB_API_KEY=...  HF_TOKEN=...
#   # LoRA (기본, A100×1):
#   sky launch -c tfct-grpo-verl sky/grpo.verl.sky.yaml --env WANDB_API_KEY --env HF_TOKEN
#   # full GRPO (8B 정책+vllm rollout → 노드 내 멀티GPU):
#   sky launch -c tfct-grpo-verl sky/grpo.verl.sky.yaml --gpus A100:8 \
#     --env CONFIG=configs/grpo/qwen3-8b_gsm8k__verl__full.yaml \
#     --env WANDB_API_KEY --env HF_TOKEN
#   sky logs tfct-grpo-verl            # 로그 스트리밍
#   sky down tfct-grpo-verl            # 끝나면 파기 (idle 과금 방지)
#
# (멀티노드 3단계는 verl ray 멀티노드 배선 필요 — 단일 노드 멀티GPU 까지가 이 yaml 범위.)

name: tfct-grpo-verl

resources:
  accelerators: A100:1                                 # LoRA 8B 기본(A100 40GB 한 장). full 은 --gpus 로 override
  use_spot: true                                       # 스팟; 끊기면 SkyPilot 이 자동 복구
  image_id: docker:ghcr.io/jaegookyou/training-framework-comparison-tutorial/verl:latest  # SFT 와 동일 verl 이미지(vllm 포함)

workdir: .                                             # 이 repo 를 통째로 박스로 업로드 (코드는 런타임에)

envs:
  CONFIG: configs/grpo/qwen3-8b_gsm8k__verl__lora.yaml
  WANDB_API_KEY: ""                                    # `--env WANDB_API_KEY` 로 주입
  HF_TOKEN: ""                                         # `--env HF_TOKEN` 로 주입 (HF Hub push 시)

setup: |
  pip install -e .                                     # 코드만 (무거운 deps 는 image 에 이미 있음)

run: |
  tfct-run --config $CONFIG
