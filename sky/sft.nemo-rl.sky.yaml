# tfct SFT 런 (NeMo-RL) — SkyPilot task.
#
# NeMo-RL SFT(헤비/DTensor). 런치는 tfct-run 이 RunConfig 를 Hydra override 로 번역해
# examples/run_sft.py 를 내부에서 띄운다. 데이터=TraceInversion(다른 SFT 와 동일 = 통제비교), 캐논
# REASONING_CHATML 은 baked 토크나이저로 적용.
#
# 사용:
#   export WANDB_API_KEY=...  HF_TOKEN=...
#   # LoRA (A100×1):
#   sky launch -c tfct-sft-nemo sky/sft.nemo-rl.sky.yaml --env WANDB_API_KEY --env HF_TOKEN
#   # full (A100×8):
#   sky launch -c tfct-sft-nemo sky/sft.nemo-rl.sky.yaml --gpus A100:8 \
#     --env CONFIG=configs/sft/qwen3-8b_traceinversion__nemo-rl__full.yaml --env WANDB_API_KEY --env HF_TOKEN
#   sky down tfct-sft-nemo

name: tfct-sft-nemo

resources:
  accelerators: A100:1
  use_spot: true
  image_id: docker:ghcr.io/jaegookyou/training-framework-comparison-tutorial/nemo-rl:latest

workdir: .

envs:
  CONFIG: configs/sft/qwen3-8b_traceinversion__nemo-rl__lora.yaml
  WANDB_API_KEY: ""
  HF_TOKEN: ""

setup: |
  pip install -e .          # NeMo 는 uv 환경 — 필요 시 `uv pip install -e .`(GPU 빌드 때 확정)

run: |
  tfct-run --config $CONFIG
