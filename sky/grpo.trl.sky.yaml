# tfct GRPO 런 (TRL) — SkyPilot task.
#
# SFT 패턴과 동일. 이미지(trl)·코드 재사용, CONFIG·accelerators 만 tuning(full|lora)에 맞춰 override.
# (기본 = lora, A100×1)
#
# 주의: GRPO 는 학습 중 rollout 생성이 무겁다. 현실적 8B 속도는 use_vllm=true 필요인데
# 현재 trl 이미지엔 vllm 핀이 없다 → 실사용 전 docker/trl.Dockerfile 에 vllm 추가.
# 배선/스모크는 use_vllm=false 로 돈다(느림).
#
# 사용:
#   export WANDB_API_KEY=...  HF_TOKEN=...
#   # LoRA (기본):
#   sky launch -c tfct sky/grpo.trl.sky.yaml --env WANDB_API_KEY --env HF_TOKEN
#   # full GRPO (9B 정책+rollout → 멀티GPU 샤딩):
#   sky launch -c tfct sky/grpo.trl.sky.yaml --gpus A100:8 \
#     --env CONFIG=configs/grpo/qwen3-8b_gsm8k__trl__full.yaml \
#     --env WANDB_API_KEY --env HF_TOKEN
#   sky logs tfct                     # 로그 스트리밍
#   sky down tfct                     # 끝나면 파기 (idle 과금 방지)

name: tfct-grpo-trl

resources:
  accelerators: A100:1                                 # LoRA 9B 기본(A100 40GB 한 장). full 은 --gpus 로 override
  use_spot: true                                       # 스팟; 끊기면 SkyPilot 이 자동 복구
  image_id: docker:ghcr.io/jaegookyou/training-framework-comparison-tutorial/trl:latest  # SFT 와 동일 trl 이미지

workdir: .                                             # 이 repo 를 통째로 박스로 업로드 (코드는 런타임에, 이미지 재빌드 없이)

envs:
  CONFIG: configs/grpo/qwen3-8b_gsm8k__trl__lora.yaml
  WANDB_API_KEY: ""                                    # `--env WANDB_API_KEY` 로 로컬 셸에서 주입
  HF_TOKEN: ""                                         # `--env HF_TOKEN` 로 주입 (HF Hub push 시)

setup: |
  pip install -e .                                     # 코드만 (무거운 deps 는 image 에 이미 있음)

run: |
  tfct-run --config $CONFIG
