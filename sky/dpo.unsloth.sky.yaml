# tfct DPO 런 (Unsloth) — SkyPilot task.
#
# Unsloth = 단일 GPU 전용(멀티GPU 스케일 없음). 기본 = lora(A100×1). full 은 ref 모델까지
# 한 카드에 올라 큰 VRAM 필요 → A100-80GB 권장.
#
# 사용:
#   export WANDB_API_KEY=...  HF_TOKEN=...
#   # LoRA (기본):
#   sky launch -c tfct sky/dpo.unsloth.sky.yaml --env WANDB_API_KEY --env HF_TOKEN
#   # full DPO (단일 GPU지만 ref 복제 → 큰 VRAM):
#   sky launch -c tfct sky/dpo.unsloth.sky.yaml --gpus A100-80GB:1 \
#     --env CONFIG=configs/dpo/qwen3-8b_ultrafeedback__unsloth__full.yaml \
#     --env WANDB_API_KEY --env HF_TOKEN
#   sky logs tfct                     # 로그 스트리밍
#   sky down tfct                     # 끝나면 파기 (idle 과금 방지)

name: tfct-dpo-unsloth

resources:
  accelerators: A100:1                                 # LoRA 9B 기본(A100 40GB 한 장). full 은 --gpus 로 override
  use_spot: true                                       # 스팟; 끊기면 SkyPilot 이 자동 복구
  image_id: docker:ghcr.io/jaegookyou/training-framework-comparison-tutorial/unsloth:latest  # SFT 와 동일 unsloth 이미지

workdir: .                                             # 이 repo 를 통째로 박스로 업로드 (코드는 런타임에, 이미지 재빌드 없이)

envs:
  CONFIG: configs/dpo/qwen3-8b_ultrafeedback__unsloth__lora.yaml
  WANDB_API_KEY: ""                                    # `--env WANDB_API_KEY` 로 로컬 셸에서 주입
  HF_TOKEN: ""                                         # `--env HF_TOKEN` 로 주입 (HF Hub push 시)

setup: |
  pip install -e .                                     # 코드만 (무거운 deps 는 image 에 이미 있음)

run: |
  tfct-run --config $CONFIG
