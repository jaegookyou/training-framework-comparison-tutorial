# tfct Online DPO 런 (TRL) — SkyPilot task.
#
# offline DPO 와 같은 DPO loss 의 on-policy 판: 정책이 생성 → reward model 채점 → 쌍 구성.
# prompt-only 데이터(ultrafeedback-prompt) + reward model 이 필요. SFT/DPO 와 같은 trl 이미지·
# 코드 재사용, CONFIG·accelerators 만 tuning 에 맞춰 override. Unsloth 는 online DPO 네이티브
# 경로가 없어 이 트랙은 TRL 단독.
#
# 사용:
#   export WANDB_API_KEY=...  HF_TOKEN=...
#   # LoRA (기본):
#   sky launch -c tfct-odpo sky/online_dpo.trl.sky.yaml --env WANDB_API_KEY --env HF_TOKEN
#   # full (정책+ref+RM 8B×3 → 멀티GPU 샤딩):
#   sky launch -c tfct-odpo sky/online_dpo.trl.sky.yaml --gpus A100:8 \
#     --env CONFIG=configs/online_dpo/qwen3-8b_ultrafeedback__trl__full.yaml \
#     --env WANDB_API_KEY --env HF_TOKEN
#   sky logs tfct-odpo                # 로그 스트리밍
#   sky down tfct-odpo                # 끝나면 파기 (idle 과금 방지)

name: tfct-online-dpo-trl

resources:
  accelerators: A100:1                                 # LoRA 기본. reward model(8B)까지 올라가 빠듯 — full 은 --gpus 로 override
  use_spot: true                                       # 스팟; 끊기면 SkyPilot 이 자동 복구
  image_id: docker:ghcr.io/jaegookyou/training-framework-comparison-tutorial/trl:latest  # SFT/DPO 와 동일 trl 이미지(online DPO = trl.experimental, 추가 빌드 불필요)

workdir: .                                             # 이 repo 를 통째로 박스로 업로드 (코드는 런타임에)

envs:
  CONFIG: configs/online_dpo/qwen3-8b_ultrafeedback__trl__lora.yaml
  WANDB_API_KEY: ""                                    # `--env WANDB_API_KEY` 로 주입
  HF_TOKEN: ""                                         # `--env HF_TOKEN` 로 주입 (HF Hub push 시)

setup: |
  pip install -e .                                     # 코드만 (무거운 deps 는 image 에 이미 있음)

run: |
  tfct-run --config $CONFIG
