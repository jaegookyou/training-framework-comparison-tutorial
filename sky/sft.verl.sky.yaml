# tfct SFT 런 (verl) — SkyPilot task.
#
# verl 은 hydra+torchrun 으로 구동되지만, 런치는 우리 entrypoint(tfct-run)가 RunConfig 를
# verl override 로 번역해 `torchrun -m verl.trainer.sft_trainer` 를 내부에서 띄운다 → 이
# run 블록은 trl/unsloth 와 동일하게 `tfct-run --config $CONFIG` 한 줄이다.
# 나머지(오퍼검색→생성→업로드→run→자폭+스팟복구)는 다른 sky 와 동일.
#
# 사용:
#   export WANDB_API_KEY=...  HF_TOKEN=...
#   # LoRA (기본, A100×1):
#   sky launch -c tfct-verl sky/sft.verl.sky.yaml --env WANDB_API_KEY --env HF_TOKEN
#   # full FT (9B 는 노드 내 FSDP 멀티GPU):
#   sky launch -c tfct-verl sky/sft.verl.sky.yaml --gpus A100:8 \
#     --env CONFIG=configs/sft/qwen3-8b_traceinversion__verl__full.yaml \
#     --env WANDB_API_KEY --env HF_TOKEN
#   sky logs tfct-verl                # 로그 스트리밍
#   sky down tfct-verl                # 끝나면 파기 (idle 과금 방지)
#
# Vast.ai 백엔드: ~/.config/vastai/vast_api_key 에 키 저장 → SkyPilot 이 Vast 오퍼를 띄운다.
# (멀티노드 3단계는 verl ray 변형 필요 — 단일 노드 멀티GPU 까지가 이 yaml 범위.)

name: tfct-sft-verl

resources:
  accelerators: A100:1                                 # LoRA 9B 기본(A100 40GB 한 장). full FT 는 --gpus 로 override
  use_spot: true                                       # 스팟; 끊기면 SkyPilot 이 자동 복구
  image_id: docker:ghcr.io/jaegookyou/training-framework-comparison-tutorial/verl:latest  # 프레임워크별 deps 핀 고정 이미지. configs 의 image 와 일치시킬 것

workdir: .                                             # 이 repo 를 통째로 박스로 업로드 (코드는 런타임에)

envs:
  CONFIG: configs/sft/qwen3-8b_traceinversion__verl__lora.yaml
  WANDB_API_KEY: ""                                    # `--env WANDB_API_KEY` 로 주입
  HF_TOKEN: ""                                         # `--env HF_TOKEN` 로 주입 (HF Hub push 시)

setup: |
  pip install -e .                                     # 코드만 (무거운 deps 는 image 에 이미 있음)

run: |
  tfct-run --config $CONFIG
