# tfct 사전학습 런 (Megatron-LM, continued-pretrain 8B) — SkyPilot task. torchtitan continued 의 Megatron 짝.
#
# 순수 Megatron-LM(pretrain_gpt.py)으로 Qwen3-8B-Base 를 wikitext 로 이어학습. HF↔mcore 변환만 Bridge
# (AutoBridge import/export) 글루로 쓴다 — 순수 convert.py 는 qwen3 미지원이라. entrypoint(tfct-run)가
# convert(Bridge)→preprocess→pretrain_gpt.py→export(Bridge) 를 내부에서 띄우므로 run 블록은 한 줄.
#
# 사용:
#   export WANDB_API_KEY=...  HF_TOKEN=...
#   sky launch -c tfct-pretrain-mlm sky/pretrain.megatron-lm.sky.yaml --gpus A100:8 \
#     --env WANDB_API_KEY --env HF_TOKEN
#   sky logs tfct-pretrain-mlm ; sky down tfct-pretrain-mlm
#
# ⚠️ 이미지 = megatron-bridge (AutoBridge + clone 된 Megatron-LM repo 의 pretrain_gpt.py 둘 다 보유).
#    from-scratch 는 제거됨(continued 전용).

# ⚠️ 멀티노드(--num-nodes N): convert=노드별 로컬 변환·train=torchrun 랑데부(자동)·export=head 전용.
#    export/resume 은 torch_dist 분산 체크포인트라 **공유 FS 가 필요**하다(SkyPilot file_mounts
#    또는 NFS). 공유 FS 없는 멀티노드 스모크는 train 랑데부까지만 검증되고 export 는 불완전하다.
name: tfct-pretrain-megatron-lm

resources:
  accelerators: A100:8                                 # 8B continued(TP=4) → DP=2. 스케일 시 --gpus 확대
  use_spot: true
  image_id: docker:ghcr.io/jaegookyou/training-framework-comparison-tutorial/megatron-bridge:latest

workdir: .

envs:
  CONFIG: configs/pretrain/qwen3-8b_wikitext__megatron-lm.yaml
  WANDB_API_KEY: ""
  HF_TOKEN: ""                                         # 8B-Base 가중치 다운로드(시드)

setup: |
  pip install -e .

run: |
  tfct-run --config $CONFIG
