# tfct PPO 런 (slime) — SkyPilot task.
#
# slime = SGLang 롤아웃 + Megatron 학습 RL 프레임워크. GRPO 와 같은 ray + train.py 진입점이지만
# critic(value model)으로 GAE advantage 를 추정한다(advantage-estimator=ppo, role-tagged megatron
# config 로 critic lr override). 런치는 우리 entrypoint(tfct-run)가 RunConfig 를 slime args 로 번역해
# ray job submit 을 내부에서 띄운다 → 이 run 블록은 다른 sky 와 동일하게 `tfct-run --config $CONFIG`.
#
# slime 은 full RL 전용(LoRA 없음) → lora config 없음. 8B full PPO = Megatron 샤딩 + SGLang + critic
# → 멀티GPU(GRPO 보다 메모리 큼).
#
# 사용:
#   export WANDB_API_KEY=...  HF_TOKEN=...
#   sky launch -c tfct-ppo-slime sky/ppo.slime.sky.yaml --gpus A100:8 \
#     --env WANDB_API_KEY --env HF_TOKEN
#   sky logs tfct-ppo-slime            # 로그 스트리밍
#   sky down tfct-ppo-slime            # 끝나면 파기 (idle 과금 방지)
#
# (멀티노드 3단계는 slime ray 멀티노드 배선 필요 — 단일 노드 멀티GPU 까지가 이 yaml 범위.)

name: tfct-ppo-slime

resources:
  accelerators: A100:8                                 # 8B full PPO = 멀티GPU(단일 GPU 불가). 노드에 맞춰 조정
  use_spot: true                                       # 스팟; 끊기면 SkyPilot 이 자동 복구
  image_id: docker:ghcr.io/jaegookyou/training-framework-comparison-tutorial/slime:latest  # GRPO 와 동일 slime 이미지

workdir: .                                             # 이 repo 를 통째로 박스로 업로드 (코드는 런타임에)

envs:
  CONFIG: configs/ppo/qwen3-8b_gsm8k__slime__full.yaml
  WANDB_API_KEY: ""                                    # `--env WANDB_API_KEY` 로 주입
  HF_TOKEN: ""                                         # `--env HF_TOKEN` 로 주입 (HF Hub push 시)

setup: |
  pip install -e .                                     # 코드만 (무거운 deps 는 image 에 이미 있음)

run: |
  # 멀티노드면 ray 클러스터 부트스트랩 후 head 에서만 드라이버 실행(sky/ray_bootstrap.sh).
  # 단노드면 그대로 tfct-run(프레임워크가 로컬 ray 자동 기동).
  bash sky/ray_bootstrap.sh "tfct-run --config $CONFIG"
