# tfct 사전학습 런 (torchtitan, continued-pretrain 8B) — SkyPilot task. 수직 파이프라인 1단계.
#
# Qwen3-8B-Base 가중치를 시드로 wikitext 이어학습 → out/hf 에 HF ckpt 산출(다음 단계 SFT/RL 입력 =
# 한 8B 가 PT→SFT→RL 통과). entrypoint(tfct-run)가 RunConfig 를 읽어 torchrun(torchtitan.train) +
# HF export 를 띄운다. from-scratch 는 제거됨(continued 전용).
#
# 사용:
#   export WANDB_API_KEY=...  HF_TOKEN=...
#   sky launch -c tfct-pretrain sky/pretrain.torchtitan.sky.yaml --gpus A100:4 \
#     --env WANDB_API_KEY --env HF_TOKEN
#   sky logs tfct-pretrain ; sky down tfct-pretrain
#
# ⚠️ 이미지는 torchtitan SFT 와 동일(nightly SHA 핀 + 박제 태그). Dockerfile 헤더 참고.

name: tfct-pretrain-torchtitan

resources:
  accelerators: A100:4                                 # 8B continued → 멀티GPU(FSDP). 스케일 시 --gpus 확대
  use_spot: true
  image_id: docker:ghcr.io/jaegookyou/training-framework-comparison-tutorial/torchtitan:latest

workdir: .

envs:
  CONFIG: configs/pretrain/qwen3-8b_wikitext__torchtitan.yaml
  WANDB_API_KEY: ""
  HF_TOKEN: ""                                         # 토크나이저(Qwen3) 다운로드 시

setup: |
  pip install -e .

run: |
  tfct-run --config $CONFIG
