# tfct GRPO 런 (Unsloth) — SkyPilot task.
#
# Unsloth = 단일 GPU 전용. GRPO 는 정책 모델 + vllm rollout 엔진이 같은 카드를 공유한다
# (gpu_memory_utilization 로 분할) → TRL GRPO 와 달리 별도 vllm 셋업 불필요(이미지에 vllm 핀).
# 기본 = lora(A100×1). full GRPO 는 정책 full 가중치 + vllm → A100-80GB 권장.
#
# 사용:
#   export WANDB_API_KEY=...  HF_TOKEN=...
#   # LoRA (기본):
#   sky launch -c tfct sky/grpo.unsloth.sky.yaml --env WANDB_API_KEY --env HF_TOKEN
#   # full GRPO (단일 GPU, 큰 VRAM):
#   sky launch -c tfct sky/grpo.unsloth.sky.yaml --gpus A100-80GB:1 \
#     --env CONFIG=configs/grpo/qwen3-8b_gsm8k__unsloth__full.yaml \
#     --env WANDB_API_KEY --env HF_TOKEN
#   sky logs tfct                     # 로그 스트리밍
#   sky down tfct                     # 끝나면 파기 (idle 과금 방지)

name: tfct-grpo-unsloth

resources:
  accelerators: A100:1                                 # LoRA 9B 기본(A100 40GB 한 장). full 은 --gpus 로 override
  use_spot: true                                       # 스팟; 끊기면 SkyPilot 이 자동 복구
  image_id: docker:ghcr.io/jaegookyou/training-framework-comparison-tutorial/unsloth:latest  # vllm 핀 포함 unsloth 이미지

workdir: .                                             # 이 repo 를 통째로 박스로 업로드 (코드는 런타임에, 이미지 재빌드 없이)

envs:
  CONFIG: configs/grpo/qwen3-8b_gsm8k__unsloth__lora.yaml
  WANDB_API_KEY: ""                                    # `--env WANDB_API_KEY` 로 로컬 셸에서 주입
  HF_TOKEN: ""                                         # `--env HF_TOKEN` 로 주입 (HF Hub push 시)

setup: |
  pip install -e .                                     # 코드만 (무거운 deps 는 image 에 이미 있음)

run: |
  tfct-run --config $CONFIG
